<!DOCTYPE html>
<html>

<head>

<title>Test Analysis</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:40px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.big{
font-size:28px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

</style>

</head>

<body>

<h1>Test Analysis</h1>

<input type="file" id="fileInput">

<br><br>

<div class="card">

<div class="grid">

<div>
Score
<div id="score" class="big">-</div>
</div>

<div>
Accuracy
<div id="accuracy" class="big">-</div>
</div>

<div>
Attempted
<div id="attempted" class="big">-</div>
</div>

<div>
Incorrect
<div id="incorrect" class="big">-</div>
</div>

</div>

</div>


<div class="card">

<h2>Subject Analysis</h2>

<table>

<thead>

<tr>
<th>Subject</th>
<th>Correct</th>
<th>Incorrect</th>
<th>Time</th>
</tr>

</thead>

<tbody id="subjectTable">

</tbody>

</table>

</div>


<div class="card">

<h2>Subject Score Chart</h2>

<canvas id="subjectChart"></canvas>

</div>


<div class="card">

<h2>Difficulty Analysis</h2>

<canvas id="difficultyChart"></canvas>

</div>


<div class="card">

<h2>Time Spent per Question</h2>

<canvas id="timeChart"></canvas>

</div>


<div class="card">

<h2>Painful Questions</h2>

<div id="painful"></div>

</div>


<div class="card">

<h2>Question Details</h2>

<table>

<thead>

<tr>
<th>Q</th>
<th>Subject</th>
<th>Topic</th>
<th>Difficulty</th>
<th>Time</th>
<th>Status</th>
</tr>

</thead>

<tbody id="questionTable"></tbody>

</table>

</div>


<script>

document.getElementById("fileInput").addEventListener("change",function(){

let file=this.files[0]

let reader=new FileReader()

reader.onload=function(e){

let data=JSON.parse(e.target.result)

analyze(data)

}

reader.readAsText(file)

})


function analyze(data){

let correct=data.correct
let incorrect=data.incorrect
let attempted=data.attempted

let score=correct*4 - incorrect
let accuracy=Math.round((correct/attempted)*100)

document.getElementById("score").innerText=score
document.getElementById("accuracy").innerText=accuracy+"%"
document.getElementById("attempted").innerText=attempted
document.getElementById("incorrect").innerText=incorrect


let subjects={
Physics:{correct:0,incorrect:0,time:0},
Chemistry:{correct:0,incorrect:0,time:0},
Maths:{correct:0,incorrect:0,time:0}
}

let difficulty={
Easy:0,
Moderate:0,
Hard:0
}

let painful=[]

let timeData=[]
let questionLabels=[]

let table=""

data.responses.forEach((r,i)=>{

if(!r)return

let status="Incorrect"

if(r.selected==r.correct){

status="Correct"
subjects[r.subject].correct++

}else{

subjects[r.subject].incorrect++

}

subjects[r.subject].time+=r.time

difficulty[r.difficulty]++

if(r.time>120 && r.selected!=r.correct){

painful.push(i+1)

}

timeData.push(r.time)
questionLabels.push("Q"+(i+1))

table+=`

<tr>

<td>${i+1}</td>
<td>${r.subject}</td>
<td>${r.topic}</td>
<td>${r.difficulty}</td>
<td>${r.time}s</td>
<td>${status}</td>

</tr>

`

})


document.getElementById("questionTable").innerHTML=table


let table2=""

for(let s in subjects){

table2+=`

<tr>

<td>${s}</td>
<td>${subjects[s].correct}</td>
<td>${subjects[s].incorrect}</td>
<td>${subjects[s].time}s</td>

</tr>

`

}

document.getElementById("subjectTable").innerHTML=table2


document.getElementById("painful").innerText=painful.join(", ")


new Chart(

document.getElementById("subjectChart"),

{

type:"pie",

data:{

labels:["Physics","Chemistry","Maths"],

datasets:[{

data:[

subjects.Physics.correct,
subjects.Chemistry.correct,
subjects.Maths.correct

]

}]

}

})


new Chart(

document.getElementById("difficultyChart"),

{

type:"bar",

data:{

labels:["Easy","Moderate","Hard"],

datasets:[{

label:"Questions",

data:[

difficulty.Easy,
difficulty.Moderate,
difficulty.Hard

]

}]

}

})


new Chart(

document.getElementById("timeChart"),

{

type:"line",

data:{

labels:questionLabels,

datasets:[{

label:"Time",

data:timeData

}]

}

})

}

</script>

</body>

</html>
