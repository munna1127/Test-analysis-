<!DOCTYPE html>
<html>

<head>

<title>Test Analysis</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:40px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.big{
font-size:28px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

</style>

</head>

<body>

<h1>Test Analysis</h1>

<input type="file" id="fileInput">

<br><br>

<div class="card">

<div class="grid">

<div>
Score
<div id="score" class="big">-</div>
</div>

<div>
Accuracy
<div id="accuracy" class="big">-</div>
</div>

<div>
Attempted
<div id="attempted" class="big">-</div>
</div>

<div>
Incorrect
<div id="incorrect" class="big">-</div>
</div>

</div>

</div>


<div class="card">

<h2>Subject Analysis</h2>

<table>

<thead>

<tr>
<th>Subject</th>
<th>Correct</th>
<th>Incorrect</th>
</tr>

</thead>

<tbody id="subjectTable">

</tbody>

</table>

</div>


<div class="card">

<h2>Subject Score Chart</h2>

<canvas id="subjectChart"></canvas>

</div>


<div class="card">

<h2>Correct vs Incorrect</h2>

<canvas id="accuracyChart"></canvas>

</div>


<script>

document.getElementById("fileInput").addEventListener("change",function(){

let file=this.files[0]

let reader=new FileReader()

reader.onload=function(e){

let data=JSON.parse(e.target.result)

analyze(data)

}

reader.readAsText(file)

})


function analyze(data){

let correct=data.correct
let incorrect=data.incorrect
let attempted=data.attempted

let score=correct*4 - incorrect
let accuracy=Math.round((correct/attempted)*100)

document.getElementById("score").innerText=score
document.getElementById("accuracy").innerText=accuracy+"%"
document.getElementById("attempted").innerText=attempted
document.getElementById("incorrect").innerText=incorrect


let subjects={

Physics:{correct:0,incorrect:0},
Chemistry:{correct:0,incorrect:0},
Maths:{correct:0,incorrect:0}

}

data.responses.forEach(r=>{

if(!r)return

if(r.selected==r.correct){

subjects[r.subject].correct++

}else{

subjects[r.subject].incorrect++

}

})


let table=""

for(let s in subjects){

table+=`

<tr>

<td>${s}</td>
<td>${subjects[s].correct}</td>
<td>${subjects[s].incorrect}</td>

</tr>

`

}

document.getElementById("subjectTable").innerHTML=table


new Chart(

document.getElementById("subjectChart"),

{

type:"pie",

data:{

labels:["Physics","Chemistry","Maths"],

datasets:[{

data:[

subjects.Physics.correct,

subjects.Chemistry.correct,

subjects.Maths.correct

]

}]

}

})


new Chart(

document.getElementById("accuracyChart"),

{

type:"pie",

data:{

labels:["Correct","Incorrect"],

datasets:[{

data:[correct,incorrect]

}]

}

})

}

</script>

</body>

</html>
