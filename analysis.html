<!DOCTYPE html>
<html>

<head>
<title>Mathongo Style JEE Report</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:30px;
background:#f5f7fb;
}

.section{
background:white;
padding:40px;
margin-bottom:40px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

h2{
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
border:1px solid #eee;
padding:20px;
text-align:center;
border-radius:8px;
}

.big{
font-size:28px;
font-weight:bold;
}

canvas{
max-height:350px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

</style>
</head>


<body>

<h1>JEE Test Detailed Analysis</h1>

<input type="file" id="fileInput">

<div id="overview"></div>
<div id="subjectAnalysis"></div>
<div id="accuracyGraph"></div>
<div id="difficultyAnalysis"></div>
<div id="timePerQuestion"></div>
<div id="timelineAnalysis"></div>
<div id="attemptQuality"></div>
<div id="painfulQuestions"></div>
<div id="missedConcepts"></div>
<div id="heatmap"></div>
<div id="subjectMovement"></div>
<div id="weakTopics"></div>
<div id="questionTable"></div>
<div id="performanceSummary"></div>


<script>

document.getElementById("fileInput").addEventListener("change",function(){

let reader=new FileReader()

reader.onload=(e)=>{

let data=JSON.parse(e.target.result)

startAnalysis(data)

}

reader.readAsText(this.files[0])

})


function startAnalysis(data){

let responses = data.responses || []


/* ===========================
OVERVIEW
=========================== */

function generateOverview(){

let correct = data.correct || 0
let incorrect = data.incorrect || 0
let attempted = data.attempted || 0
let total = responses.length

let score = correct*4 - incorrect
let accuracy = attempted ? Math.round(correct/attempted*100) : 0
let unattempted = total - attempted

let totalTime = 0

responses.forEach(r=>{
if(!r) return
totalTime += r.time || 0
})

let avgTime = attempted ? Math.round(totalTime/attempted) : 0

let physicsAttempt=0
let chemistryAttempt=0
let mathsAttempt=0

responses.forEach(r=>{
if(!r) return

if(r.subject==="Physics") physicsAttempt++
if(r.subject==="Chemistry") chemistryAttempt++
if(r.subject==="Maths") mathsAttempt++
})

document.getElementById("overview").innerHTML = `
<div class="section">

<h2>Overview</h2>

<div class="grid">

<div class="card">
Score
<div class="big">${score}</div>
</div>

<div class="card">
Accuracy
<div class="big">${accuracy}%</div>
</div>

<div class="card">
Attempted
<div class="big">${attempted}</div>
</div>

<div class="card">
Unattempted
<div class="big">${unattempted}</div>
</div>

</div>

<br>

<div class="grid">

<div class="card">
Avg Time / Question
<div class="big">${avgTime}s</div>
</div>

<div class="card">
Physics Attempts
<div class="big">${physicsAttempt}</div>
</div>

<div class="card">
Chemistry Attempts
<div class="big">${chemistryAttempt}</div>
</div>

<div class="card">
Maths Attempts
<div class="big">${mathsAttempt}</div>
</div>

</div>

</div>
`

}



/* ===========================
SUBJECT ANALYSIS
=========================== */

function generateSubjectAnalysis(){

let subjects = {
Physics:{correct:0,incorrect:0,attempt:0},
Chemistry:{correct:0,incorrect:0,attempt:0},
Maths:{correct:0,incorrect:0,attempt:0}
}

responses.forEach(r=>{

if(!r || !subjects[r.subject]) return

subjects[r.subject].attempt++

if(r.selected === r.correct){
subjects[r.subject].correct++
}else{
subjects[r.subject].incorrect++
}

})

document.getElementById("subjectAnalysis").innerHTML=`
<div class="section">

<h2>Subject Analysis</h2>

<table>

<tr>
<th>Subject</th>
<th>Attempted</th>
<th>Correct</th>
<th>Incorrect</th>
</tr>

<tr>
<td>Physics</td>
<td>${subjects.Physics.attempt}</td>
<td>${subjects.Physics.correct}</td>
<td>${subjects.Physics.incorrect}</td>
</tr>

<tr>
<td>Chemistry</td>
<td>${subjects.Chemistry.attempt}</td>
<td>${subjects.Chemistry.correct}</td>
<td>${subjects.Chemistry.incorrect}</td>
</tr>

<tr>
<td>Maths</td>
<td>${subjects.Maths.attempt}</td>
<td>${subjects.Maths.correct}</td>
<td>${subjects.Maths.incorrect}</td>
</tr>

</table>

<br>

<canvas id="subjectChart"></canvas>

</div>
`

new Chart(
document.getElementById("subjectChart"),
{
type:"bar",
data:{
labels:["Physics","Chemistry","Maths"],
datasets:[{
label:"Correct",
data:[
subjects.Physics.correct,
subjects.Chemistry.correct,
subjects.Maths.correct
]
}]
}
})

}



/* ===========================
TIME PER QUESTION
=========================== */

function generateTimePerQuestion(){

let labels=[]
let timeData=[]

responses.forEach((r,i)=>{
if(!r) return

labels.push("Q"+(i+1))
timeData.push(r.time || 0)
})

document.getElementById("timePerQuestion").innerHTML=`

<div class="section">

<h2>Time Per Question</h2>

<canvas id="timeChart"></canvas>

</div>
`

new Chart(
document.getElementById("timeChart"),
{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Time (sec)",
data:timeData
}]
}
})

}



/* ===========================
TIMELINE
=========================== */

function generateTimeline(){

let blocks=[0,0,0,0,0,0]

let total = responses.length || 1

responses.forEach((r,i)=>{

if(!r) return

let block = Math.floor(i/(total/6))

if(block>5) block=5

blocks[block]++

})

document.getElementById("timelineAnalysis").innerHTML=`

<div class="section">

<h2>Timeline Analysis</h2>

<canvas id="timelineChart"></canvas>

</div>
`

new Chart(
document.getElementById("timelineChart"),
{
type:"bar",
data:{
labels:[
"0-30",
"30-60",
"60-90",
"90-120",
"120-150",
"150-180"
],
datasets:[{
label:"Attempts",
data:blocks
}]
}
})

}



/* ===========================
HEATMAP
=========================== */

function generateHeatmap(){

let html=`
<div class="section">
<h2>Question Heatmap</h2>
<div style="display:grid;grid-template-columns:repeat(10,1fr);gap:6px;">
`

responses.forEach((r,i)=>{

let color="#ccc"

if(r){

if(r.selected===r.correct){
color="#4CAF50"
}
else{
color="#F44336"
}

}

html+=`
<div style="
padding:12px;
text-align:center;
border-radius:6px;
color:white;
background:${color};
">
${i+1}
</div>
`

})

html+=`</div></div>`

document.getElementById("heatmap").innerHTML=html

}



/* ===========================
PERFORMANCE SUMMARY
=========================== */

function generatePerformanceSummary(){

let correct=data.correct||0
let incorrect=data.incorrect||0
let score=correct*4-incorrect

let level="Needs Improvement"

if(score>250) level="Excellent"
else if(score>200) level="Very Good"
else if(score>150) level="Good"

document.getElementById("performanceSummary").innerHTML=`

<div class="section">

<h2>Performance Summary</h2>

<div class="card">

<h3>${level}</h3>

<p>Score : ${score}</p>

</div>

</div>
`

}



/* ===========================
CALL ALL
=========================== */

generateOverview()
generateSubjectAnalysis()
generateTimePerQuestion()
generateTimeline()
generateHeatmap()
generatePerformanceSummary()

}

</script>

</body>
</html>
